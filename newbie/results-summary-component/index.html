<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link
            rel="icon"
            type="image/png"
            sizes="32x32"
            href="./assets/images/favicon-32x32.png"
        />

        <title>Frontend Mentor | Results summary component</title>
        <link rel="stylesheet" href="./css/style.css" />
    </head>
    <body>
        <main>
            <section id="result">
                <h2>Your Result</h2>
                <div class="result">
                    <p>76</p>
                    <span>of 100</span>
                </div>
                <h3>Great</h3>
                <p>
                    You scored higher than 65% of the people who have taken
                    these tests.
                </p>
            </section>
            <section id="summary">
                <h2>Summary</h2>
                <ul class="summary">
                    <li>
                        Reaction<span>80 <span class="dim">/ 100</span> </span>
                    </li>
                    <li>
                        Memory <span>92 <span class="dim">/ 100</span></span>
                    </li>
                    <li>
                        Verbal <span>61 <span class="dim">/ 100</span></span>
                    </li>
                    <li>
                        Visual <span>72 <span class="dim">/ 100</span></span>
                    </li>
                </ul>
                <button type="button" id="btn">Continue</button>
            </section>
        </main>

        <script src="./js/script.js"></script>
    </body>
</html>
