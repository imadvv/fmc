<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Age calculator app</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <h1 id="test"></h1>
    <main>
      <form>
        <div class="form-group">
          <label for="day">day</label>
          <input
            id="day"
            type="text"
            inputmode="numeric"
            placeholder="DD"
            maxlength="2"
            pattern="^(0[1-9]|[12]\d|3[01])"
            required
          />
          <span class="err" data-err="false">must be a valid day</span>
        </div>
        <div class="form-group">
          <label for="month">month</label>
          <input
            id="month"
            type="text"
            inputmode="numeric"
            placeholder="MM"
            maxlength="2"
            pattern="^(0[1-9]|1[0-2])$"
            required
          />
          <span class="err" data-err="false">must be a valid month</span>
        </div>
        <div class="form-group">
          <label for="year">year</label>
          <input
            id="year"
            type="text"
            placeholder="YY"
            minlength="4"
            maxlength="4"
            pattern="(19|20)\d{2}$"
            required
          />
          <span class="err" data-err="false">must be in the past</span>
        </div>
        <button><img src="./assets/images/icon-arrow.svg" /></button>
      </form>
      <div class="results">
        <p><span id="years">--</span> years</p>
        <p><span id="months">--</span>months</p>
        <p><span id="days">--</span> days</p>
      </div>
    </main>

    <script src="./js/main.js"></script>
  </body>
</html>
