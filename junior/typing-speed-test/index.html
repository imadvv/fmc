<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">

  <title>Frontend Mentor | Typing Speed Test</title>
  <link rel="stylesheet" href="./css/style.css">
</head>

<body>

  <header>
    <div class="logo"><img src="./assets/images/logo-large.svg" alt=""></div>
    <div>
      <strong> Personal best:<span>100</span>WPM</strong>
    </div>
  </header>

  <main>
    <div>
      <p>WPM: <span></span></p>
      <p>Accuracy: <span></span></p>
      <p>Time: <span></span></p>
    </div>
    <div>
      <ul>
        <h3>Difficulty:</h3>
        <li><button type="button">Easy</button></li>
        <li><button type="button">Medium</button></li>
        <li><button type="button">Hard</button></li>
      </ul>
    </div>
    <div>
      <ul>
        <h3> Mode:</h3>
        <li><button type="button">Timed (60s)</button></li>
        <li><button type="button">Passage</button></li>
      </ul>
    </div>

    <div>
      <button type="button">Start Typing Test</button>
      <p>Or click the text and start typing
      </p>
    </div>
  </main>

  <!-- Test Complete Start -->

  <!-- Test Complete! -->
  <!-- Solid run. Keep pushing to beat your high score. -->

  <!-- WPM: <!-- WPM --> -->
  <!-- Accuracy: <!-- Accuracy --> -->
  <!-- Characters: <!-- Correct/Incorrect --> -->

  <!-- Go Again -->

  <!-- Test Complete End -->

</body>

</html>
